# ──────────────────────────────────────────────────────────
# Cloud-Native CI/CD Pipeline
# M.Sc. IT — Cloud & Application Development
# ──────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/ec2-deploy
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ── JOB 1: BUILD & TEST ──────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd-pipeline

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('cicd-pipeline/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean compile

      - name: Run Unit Tests
        run: mvn test

      - name: Package Application
        run: mvn package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cicd-pipeline-jar
          path: cicd-pipeline/target/*.jar
          retention-days: 5

  # ── JOB 2: CODE QUALITY ──────────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: cicd-pipeline

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('cicd-pipeline/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Code Quality Checks
        run: |
          echo "Running code quality checks..."
          mvn validate
          echo "Code quality check completed ✅"

  # ── JOB 3: DOCKER BUILD & PUSH TO ECR ────────────────────
  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('cicd-pipeline/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Package Application
        run: mvn package -DskipTests -f cicd-pipeline/pom.xml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t cicd-pipeline:${{ github.sha }} ./cicd-pipeline
          docker tag cicd-pipeline:${{ github.sha }} ${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }}
          docker tag cicd-pipeline:${{ github.sha }} ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Push Docker Image to ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest
          echo "✅ Docker image pushed to ECR successfully!"

  # ── JOB 4: DEPLOY TO EC2 ─────────────────────────────────
  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URI }}

            # Pull latest image
            docker pull ${{ secrets.ECR_REPOSITORY_URI }}:latest

            # Stop and remove old container
            docker stop cicd-app || true
            docker rm cicd-app || true

            # Run new container
            docker run -d \
              --name cicd-app \
              --restart always \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:3306/cicddb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.RDS_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              ${{ secrets.ECR_REPOSITORY_URI }}:latest

            echo "✅ Application deployed successfully!"

  # ── JOB 5: PIPELINE SUCCESS ───────────────────────────────
  notify-success:
    name: Pipeline Success
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build-push, deploy-to-ec2]

    steps:
      - name: Pipeline Summary
        run: |
          echo "======================================"
          echo "  CI/CD Pipeline Completed! ✅"
          echo "======================================"
          echo "  ✅ Build:        Passed"
          echo "  ✅ Tests:        Passed"
          echo "  ✅ Code Quality: Passed"
          echo "  ✅ Docker Push:  Pushed to ECR"
          echo "  ✅ EC2 Deploy:   App Live on AWS!"
          echo "======================================"
          echo "  🌐 App URL: http://${{ secrets.EC2_HOST }}:8080"
          echo "======================================"