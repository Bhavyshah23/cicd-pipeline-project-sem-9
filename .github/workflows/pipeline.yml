# ──────────────────────────────────────────────────────────
# Cloud-Native CI/CD Pipeline
# M.Sc. IT — Cloud & Application Development
# ──────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/github-actions
  pull_request:
    branches:
      - main
      - develop
      - feature/github-actions

jobs:

  # ── JOB 1: BUILD & TEST ──────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -f cicd-pipeline/pom.xml

      - name: Run Unit Tests
        run: mvn test -f cicd-pipeline/pom.xml
          -Dspring.datasource.url=jdbc:h2:mem:testdb
          -Dspring.datasource.driver-class-name=org.h2.Driver
          -Dspring.datasource.username=sa
          -Dspring.datasource.password=
          -Dspring.jpa.hibernate.ddl-auto=create-drop

      - name: Package Application
        run: mvn package -DskipTests -f cicd-pipeline/pom.xml

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cicd-pipeline-jar
          path: cicd-pipeline/target/*.jar
          retention-days: 5

  # ── JOB 2: CODE QUALITY ──────────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Code Quality Checks
        run: |
          echo "Running code quality checks..."
          mvn validate -f cicd-pipeline/pom.xml
          echo "Code quality check completed ✅"

  # ── JOB 3: DOCKER BUILD ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package Application
        run: mvn package -DskipTests -f cicd-pipeline/pom.xml

      - name: Build Docker Image
        run: |
          echo "Docker build will be configured in Week 4"
          echo "Pipeline structure verified ✅"

  # ── JOB 4: PIPELINE SUCCESS ───────────────────────────────
  notify-success:
    name: Pipeline Success
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build]

    steps:
      - name: Pipeline Summary
        run: |
          echo "======================================"
          echo "  CI/CD Pipeline Completed! ✅"
          echo "======================================"
          echo "  ✅ Build:        Passed"
          echo "  ✅ Tests:        Passed"
          echo "  ✅ Code Quality: Passed"
          echo "  ✅ Docker Build: Passed"
          echo "======================================"